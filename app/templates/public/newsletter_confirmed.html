{% extends 'base.html' %}
{% block title %}訂閱確認成功 — Newsletter{% endblock %}

{% block content %}

<section class="section" style="min-height: 70vh; display: flex; align-items: center;">
  <div class="container">
    <div style="max-width: 560px; margin: 0 auto; text-align: center; padding: var(--sp-20) 0;">

      <div style="font-size: var(--text-4xl); font-weight: 900; margin-bottom: var(--sp-6);">&#9993;</div>

      <span class="section-label">Newsletter</span>
      <h1 style="font-size: var(--text-4xl); font-weight: 900; line-height: 1.1; margin: var(--sp-4) 0 var(--sp-8);">
        訂閱<br>確認成功
      </h1>

      <p style="font-size: var(--text-base); color: var(--color-text-2); line-height: 1.8; margin-bottom: var(--sp-10);">
        感謝你訂閱 ROSZIE INK！<br>
        新作品、課程開放、工作室大小事，<br>
        我們會第一時間通知你。
      </p>

      <div style="display: flex; gap: var(--sp-4); justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('public.home') }}" class="btn btn--ghost">&larr; 回到首頁</a>
        <a href="{{ url_for('public.portfolio') }}" class="btn btn--primary">瀏覽作品集 &rarr;</a>
      </div>

    </div>
  </div>
</section>

{% endblock %}
