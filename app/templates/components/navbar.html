<nav class="navbar" id="navbar" aria-label="主導覽">
  <div class="navbar__inner">

    <a class="navbar__logo" href="{{ url_for('public.home') }}">
      {{ site.name or 'ROSZIE INK' }}
    </a>

    <button class="navbar__toggle" id="navbar-toggle"
            aria-label="開啟選單" aria-expanded="false" aria-controls="navbar-menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="navbar__menu" id="navbar-menu" role="list">
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.about' %}is-active{% endif %}"
           href="{{ url_for('public.about') }}">About</a>
      </li>
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.courses' or request.endpoint == 'public.course_detail' %}is-active{% endif %}"
           href="{{ url_for('public.courses') }}">課程</a>
      </li>
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.artists' or request.endpoint == 'public.artist_detail' %}is-active{% endif %}"
           href="{{ url_for('public.artists') }}">店內藝術家</a>
      </li>
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.shop' or request.endpoint == 'public.shop_detail' %}is-active{% endif %}"
           href="{{ url_for('public.shop') }}">認領圖商城</a>
      </li>
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.magazine' or request.endpoint == 'public.post_detail' %}is-active{% endif %}"
           href="{{ url_for('public.magazine') }}">ROSZIE 雜誌</a>
      </li>
      <li>
        <a class="navbar__link {% if request.endpoint == 'public.contact' %}is-active{% endif %}"
           href="{{ url_for('public.contact') }}">活動公告</a>
      </li>
      <li>
        <a class="navbar__cta" href="{{ url_for('public.appointment') }}">
          Book Now
        </a>
      </li>
    </ul>

  </div>
</nav>
