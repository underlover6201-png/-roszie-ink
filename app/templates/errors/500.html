{% extends 'base.html' %}
{% block title %}500 — 伺服器錯誤{% endblock %}

{% block content %}
<div style="min-height: 80dvh; display:flex; align-items:center; justify-content:center; text-align:center; padding: var(--sp-8);">
  <div>
    <p style="font-size: var(--text-hero); font-weight:800; line-height:1; color: var(--color-border); letter-spacing:-0.05em;">500</p>
    <h1 style="font-size: var(--text-2xl); font-weight:700; margin-top: var(--sp-4);">Server Error</h1>
    <p style="color: var(--color-text-muted); margin-top: var(--sp-4);">伺服器出了點問題，我們正在修復。</p>
    <a href="{{ url_for('public.home') }}" class="btn btn--ghost" style="margin-top: var(--sp-8);">
      &larr; 回首頁
    </a>
  </div>
</div>
{% endblock %}
